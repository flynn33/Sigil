name: RuneForge
options:
  minimumXcodeGenVersion: 2.44.1
  deploymentTarget:
    iOS: "17.0"

packages:
  ForsettiFramework:
    path: Forsetti-Framwork
  RFCoreModels:
    path: Packages/RFCoreModels
  RFEngineData:
    path: Packages/RFEngineData
  RFSecurity:
    path: Packages/RFSecurity
  RFStorage:
    path: Packages/RFStorage
  RFSigilPipeline:
    path: Packages/RFSigilPipeline
  RFMeaning:
    path: Packages/RFMeaning
  RFGeocoding:
    path: Packages/RFGeocoding
  RFRendering:
    path: Packages/RFRendering
  RFMythosCatalog:
    path: Packages/RFMythosCatalog
  RFEditor:
    path: Packages/RFEditor
  RFExport:
    path: Packages/RFExport
  RFSigilForsettiModules:
    path: Packages/RFSigilForsettiModules

targets:
  SigilApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App/Sources
      - path: App/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigil.app
        PRODUCT_NAME: Sigil
        SWIFT_VERSION: 6.0
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_CFBundleDisplayName: Sigil
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Sigil does not use microphone access.
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Sigil uses location only for Apple Maps birthplace search.
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: 1
    dependencies:
      - package: ForsettiFramework
        product: ForsettiCore
      - package: ForsettiFramework
        product: ForsettiPlatform
      - package: ForsettiFramework
        product: ForsettiHostTemplate
      - package: RFCoreModels
      - package: RFEngineData
      - package: RFSecurity
      - package: RFStorage
      - package: RFSigilPipeline
      - package: RFMeaning
      - package: RFGeocoding
      - package: RFRendering
      - package: RFMythosCatalog
      - package: RFEditor
      - package: RFExport
      - package: RFSigilForsettiModules

  SigilAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App/Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigil.app.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: 6.0
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Sigil.app/Sigil"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: SigilApp

schemes:
  Sigil:
    build:
      targets:
        SigilApp: all
        SigilAppTests: [test]
    test:
      targets:
        - SigilAppTests
