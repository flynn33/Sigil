strict: true
reporter: "xcode"

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - Scripts
  - XcodeTemplates

opt_in_rules:
  - non_overridable_class_declaration
  - force_cast
  - force_try
  - force_unwrapping
  - private_over_fileprivate

disabled_rules:
  - for_where

line_length:
  warning: 160
  error: 200
  ignores_urls: true
  ignores_comments: true

function_body_length:
  warning: 120
  error: 180

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - ui

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 800
  error: 1000

custom_rules:
  forsetti_core_layer_imports:
    name: "Forsetti Core Layer Import Rule"
    included: "Sources/ForsettiCore/.*\\.swift"
    regex: "(?m)^\\s*import\\s+(ForsettiPlatform|ForsettiModulesExample|ForsettiHostTemplate|SwiftUI|UIKit|AppKit|StoreKit)\\b"
    message: "ForsettiCore must stay platform-agnostic and cannot import UI/commerce layers."
    severity: error
  forsetti_platform_layer_imports:
    name: "Forsetti Platform Layer Import Rule"
    included: "Sources/ForsettiPlatform/.*\\.swift"
    regex: "(?m)^\\s*import\\s+(ForsettiModulesExample|ForsettiHostTemplate|SwiftUI|UIKit|AppKit)\\b"
    message: "ForsettiPlatform may depend on ForsettiCore, but not UI template/example layers."
    severity: error
  forsetti_modules_layer_imports:
    name: "Forsetti Modules Layer Import Rule"
    included: "Sources/ForsettiModulesExample/.*\\.swift"
    regex: "(?m)^\\s*import\\s+(ForsettiPlatform|ForsettiHostTemplate|SwiftUI|UIKit|AppKit|StoreKit)\\b"
    message: "ForsettiModulesExample must remain decoupled from platform and host layers."
    severity: error
  forsetti_host_template_layer_imports:
    name: "Forsetti Host Template Layer Import Rule"
    included: "Sources/ForsettiHostTemplate/.*\\.swift"
    regex: "(?m)^\\s*import\\s+ForsettiModulesExample\\b"
    message: "ForsettiHostTemplate must not import module-example implementations directly."
    severity: error
