name: Main CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate-check:
    name: Engine contamination guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for forbidden engine-specific files
        run: |
          FORBIDDEN_FILE=".github/forbidden-on-main.txt"
          if [ ! -f "$FORBIDDEN_FILE" ]; then
            echo "Warning: $FORBIDDEN_FILE not found, skipping gate check"
            exit 0
          fi

          # Build grep patterns from the forbidden file (skip comments and blanks)
          PATTERNS=""
          while IFS= read -r line; do
            line=$(echo "$line" | sed 's/#.*//' | xargs)
            [ -z "$line" ] && continue

            # Convert glob to grep pattern
            if echo "$line" | grep -q '/\s*$'; then
              # Directory pattern (e.g. Assets/) - match any file under it
              dir=$(echo "$line" | sed 's|/\s*$||')
              PATTERNS="$PATTERNS|^$dir/"
            elif echo "$line" | grep -q '^\*\.'; then
              # Extension pattern (e.g. *.cs) - match files ending with it
              ext=$(echo "$line" | sed 's/^\*\.//')
              PATTERNS="$PATTERNS|\.$ext$"
            else
              # Exact file match
              PATTERNS="$PATTERNS|^$line$"
            fi
          done < "$FORBIDDEN_FILE"

          # Remove leading pipe
          PATTERNS=$(echo "$PATTERNS" | sed 's/^|//')

          if [ -z "$PATTERNS" ]; then
            echo "No patterns to check"
            exit 0
          fi

          # Get changed files
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD 2>/dev/null || git diff --name-only HEAD~1)
          else
            FILES=$(git diff --name-only HEAD~1 2>/dev/null || git ls-tree --name-only -r HEAD)
          fi

          FOUND=$(echo "$FILES" | grep -E "$PATTERNS" || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Engine-specific files detected on main branch!"
            echo ""
            echo "The following files do not belong on main:"
            echo "$FOUND" | while read -r f; do echo "  - $f"; done
            echo ""
            echo "Main is the engine-agnostic spec. Engine code belongs on dedicated branches (unity, Unreal-Engine, etc.)."
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi

          echo "Gate check passed: no engine-specific files found."

  validate:
    name: Validate invariants
    runs-on: ubuntu-latest
    needs: gate-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Validate cosmology schema
        run: python -m scripts.validate_schema data/cosmology/canonical-pattern-vectors.json data/cosmology/cosmology_schema.json

      - name: Validate timeline schema
        run: python -m scripts.validate_schema data/cosmology/timeline.json data/cosmology/cosmology_schema.json

      - name: Validate all invariants
        run: python -m scripts.validate_invariants

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: gate-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run pytest
        run: python -m pytest -q

  visualize:
    name: Generate plane histogram
    runs-on: ubuntu-latest
    needs: [validate, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Generate histogram
        continue-on-error: true
        run: python -m scripts.visualize_planes --n 5000 --out out/plane_hist.png --canonical

      - name: Upload histogram
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plane-histogram
          path: out/plane_hist.png
